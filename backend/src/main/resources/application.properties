# Application Port
server.port=8080

# SQLite Database Connection Properties
spring.datasource.url=jdbc:sqlite:employee_payroll.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# JPA and Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# Enable H2-style console or just Swagger for testing (we'll use Swagger)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# File Upload Configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads/

# JWT Configuration Details
# Secret must be at least 256-bit (64 hex characters)
app.jwt.secret=9a67471ec639aa8dcd0f2e825e378c3132e4d03e91129b8c08466e8ad76c6665
app.jwt.expiration-ms=86400000
